# Stryker.NET mutation testing — scoped to the SAML/OIDC validation and
# login/role-mapping core (#169).
#
# Why mutation testing, and why non-blocking:
#   Mutation score is our LOCAL test-quality signal. Stryker seeds faults
#   (mutants) into the security-critical validators and checks that a test then
#   fails; a SURVIVING mutant is a fault our tests would miss, i.e. a concrete
#   test-writing prompt (kill it with a new negative test, or document why it is
#   an equivalent/acceptable mutant). This deliberately does NOT add a raw
#   line-coverage percentage gate — line coverage correlates weakly with fault
#   detection. The standing bar stays "every security branch has a negative
#   test"; mutation score measures whether we actually met it.
#
# NON-BLOCKING for the SCORE, loud for BREAKAGE (#899):
#   1. No `pull_request` trigger. This workflow never runs as a PR check, so it
#      is not — and cannot silently become — a required status check on the
#      protected branch. It runs on manual dispatch (and, when re-enabled,
#      weekly).
#   2. `thresholds.break` is 0 in stryker-config.json, so `dotnet stryker` never
#      exits non-zero on a LOW SCORE. The score is reported, not enforced.
#   3. An infrastructure failure, by contrast, MUST show red: the former
#      `continue-on-error: true` + `if-no-files-found: warn` combination let a
#      run that produced no report at all end green — exactly how the MTP
#      migration's Stryker breakage stayed invisible until the #718 review
#      predicted it and a dispatch confirmed it. A run with no report now fails
#      visibly (fail-closed reporting; the run is still never a merge gate).
#
# RUNS AGAINST THE VSTEST TWIN (#899): dotnet-stryker (<= 4.16.0) drives its
# runs through VSTest and cannot mutate the Microsoft.Testing.Platform-v2 test
# project (stryker-mutator/stryker-net#3094; upstream's in-progress MTP runner
# targets MTP v1 first). SSO-Auth.Tests.Stryker compiles the SAME test sources
# as a classic VSTest container purely for this run — verified empirically:
# a scoped mutation run kills mutants again (40/40 on RolePrivilegeMapper).
# Delete the twin and point this back at SSO-Auth.Tests when Stryker ships
# MTP v2 support.
#
# Hardened per the repo workflow policy (see zizmor.yml): every action is
# SHA-pinned with a version comment, checkout runs with persist-credentials:false,
# and permissions are read-only. Stryker itself is version-pinned via the
# committed tool manifest (.config/dotnet-tools.json) and restored with
# `dotnet tool restore`, so the tool version is reproducible, not "latest".
name: Stryker mutation testing

on:
  schedule:
    # Weekly (Mondays). Offset from the Scorecard cron (27 4 * * 1) so the two
    # scheduled runs do not contend for a runner at the same minute. Re-enabled
    # with the VSTest twin (#899) after the MTP migration had paused it.
    - cron: "41 5 * * 1"
  # Let a maintainer run it on demand from the Actions tab.
  workflow_dispatch:

# Read-only: this job only reads the code and uploads a run artifact. It never
# writes to the repo, a release, or the security dashboard.
permissions:
  contents: read

# A newer run on the same ref supersedes an in-flight one — this is an
# informational scan, so cancelling a superseded run is safe.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: Mutation testing (${{ matrix.scope.name }})
    runs-on: ubuntu-latest
    # Mutation testing re-runs the covered tests once per mutant. The full scoped
    # core is ~1379 mutants — ~3.5h serial on a 2-core runner, which killed the
    # first VSTest-twin run at the old 60-minute limit. The matrix splits the
    # scope into three parallel legs (~1-1.5h each); the timeout is sized for the
    # largest leg with headroom. Weekly + informational, so wall clock is cheap.
    timeout-minutes: 240
    strategy:
      # One leg failing (e.g. a timeout) must not cancel the others' reports.
      fail-fast: false
      matrix:
        scope:
          - name: saml
            mutate: "Api/Saml/*.cs"
          - name: oidc
            mutate: "Api/Oidc/*.cs"
          - name: core
            mutate: "Api/Authz/RolePrivilegeMapper.cs,Api/Session/LoginStatusMapper.cs,Api/Linking/AdoptionEligibilityResolver.cs"
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step pushes via git, so do not persist the GITHUB_TOKEN in
          # .git/config (zizmor "artipacked" hardening).
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          # Both SDKs the multi-target build needs: net9.0 (Jellyfin 10.11 line)
          # and net10.0 (Jellyfin 12.0 line). Stryker mutates the net9.0 leg
          # (target-framework in stryker-config.json), but the tests reference
          # both, so install both explicitly.
          dotnet-version: |
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        # --locked-mode fails the restore if the committed packages.lock.json
        # files would change, matching the main build job's supply-chain posture.
        # The VSTest twin is deliberately outside the solution (it must never join
        # the normal build/test path), so it is restored explicitly — otherwise
        # Stryker's implicit build would restore it WITHOUT locked-mode.
        run: |
          dotnet restore --locked-mode
          dotnet restore SSO-Auth.Tests.Stryker/SSO-Auth.Tests.Stryker.csproj --locked-mode

      - name: Restore pinned .NET tools (Stryker)
        # Installs dotnet-stryker at the version pinned in .config/dotnet-tools.json.
        run: dotnet tool restore

      - name: Run Stryker (scoped, score-non-blocking)
        # break=0 in config keeps a LOW SCORE from exiting non-zero (the score is
        # a signal, not a gate). A tool/infrastructure failure, however, exits
        # non-zero and now fails the run visibly — no continue-on-error, per the
        # fail-closed-reporting note at the top (#899). Run from the VSTest twin
        # directory so Stryker picks up stryker-config.json and drives the twin
        # (the MTP-v2 test project is not VSTest-mutable — see the header note).
        working-directory: SSO-Auth.Tests.Stryker
        env:
          # This leg's mutate scope (comma-separated globs). CLI -m REPLACES the
          # config's mutate list, so each leg mutates exactly its slice.
          MUTATE: ${{ matrix.scope.mutate }}
        run: |
          IFS="," read -ra globs <<< "$MUTATE"
          args=()
          for g in "${globs[@]}"; do args+=(-m "$g"); done
          dotnet stryker "${args[@]}"

      - name: Upload mutation report
        # Publish the HTML/markdown report as a run artifact even when the scan
        # step failed, so whatever partial output exists can be reviewed — but a
        # run that produced NO report fails here (if-no-files-found: error), so
        # silent signal loss is impossible (#899).
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stryker-mutation-report-${{ matrix.scope.name }}
          path: SSO-Auth.Tests.Stryker/StrykerOutput/**/reports/**
          retention-days: 14
          if-no-files-found: error
