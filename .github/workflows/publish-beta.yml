name: Publish Beta

# The JF10.11 BETA channel (#592). Every push to main publishes an installable
# prerelease build into the `manifest-beta` branch, so beta testers on the beta
# repository URL get the newest main automatically. This replaces the old hidden
# `nightly` (which built a 0.0.0.9000 sentinel that every manifest filtered out,
# so nothing was ever installable from it).
#
# Channel vs generation:
#   - Channel is expressed by SEPARATE manifest branches, because Jellyfin has no
#     in-manifest channel flag. Stable (publish.yml) writes `manifest-release`
#     with ignorePrereleases: true; this beta job writes `manifest-beta` with
#     ignorePrereleases: false, so the beta manifest surfaces the newest of the
#     prerelease beta builds AND any stable release.
#   - Generation (JF10.11 vs the future JF10.12) is a different BUILD. This job is
#     the .NET 9 / Jellyfin 10.11 leg (OidcClient must stay 6.x, #590). The
#     JF10.12 (.NET 10 / OidcClient 7.x) leg is added when a 10.12 SDK exists;
#     it will feed `manifest-jf12-beta`.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Explicit deny-all at workflow level; the job below opts into write access
# explicitly rather than granting it workflow-wide.
permissions: {}

# Serialize beta publishes: a burst of merges to main must not run two of these
# concurrently, or their manifest-branch pushes / draft-publish steps race
# (a transient non-fast-forward, or an out-of-order manifest regeneration).
# cancel-in-progress is false on purpose — a publish must never be killed
# mid-run (it holds contents:write and moves a release + a manifest branch),
# matching the never-cancel posture noted in zizmor.yml.
concurrency:
  group: publish-beta
  cancel-in-progress: false

jobs:
  build:
    name: Build & publish beta
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # This job creates the GitHub release and updates the manifest branch, so it
    # opts into write access explicitly rather than granting it workflow-wide.
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        # The release/manifest steps authenticate with GITHUB_TOKEN via their action
        # inputs, not the git remote, so the persisted checkout token is unneeded.
        persist-credentials: false
    - name: Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: 9.0.x
        # No NuGet cache here: this job publishes a release with contents:write,
        # so a poisoned restore cache would reach the published artifact. The
        # --locked-mode restore below re-downloads against the committed lockfile.
    - name: Restore dependencies
      # Match the CI build: --locked-mode rejects a drifted or tampered dependency graph.
      run: dotnet restore --locked-mode
    - name: Build Dotnet
      run: dotnet build --no-restore --warnaserror
    - name: Derive the beta version
      id: version
      # Beta version = build.yaml's `version`, which is the NEXT RELEASE TARGET (the
      # version main is developing toward), with the workflow run number as the fourth
      # octet: <target>.<run_number>, released as "<target>-beta". The maintainer sets
      # the target per change class — a patch (4.1.1 stable -> 4.1.2), a feature
      # (-> 4.2.0), or a breaking release (-> 5.0.0) — so the beta always tracks the
      # actual next release: 4.1.2-beta, then 4.2.0-beta, then 5.0.0-beta. The same
      # target is what a `<target>-stable` tag releases; after a stable ships the
      # maintainer bumps build.yaml to the next target. Betas therefore always outrank
      # the current stable; the two channels are separate manifests, so that is fine.
      # The build number is monotonic within this workflow, which is all Jellyfin's
      # version precedence needs; the beta stays out of the stable manifest because it
      # is a prerelease.
      # The grep pins the three-part shape so a malformed build.yaml fails here rather
      # than producing a bogus tag. RUN_NUMBER is passed via env (not inlined into the
      # script) so no ${{ }} expansion is spliced into the shell.
      #
      # CONSTRAINT: github.run_number is keyed to THIS workflow file's identity, so
      # renaming this file resets it to 1. That is safe only while build.yaml's A.B.C
      # has moved on since the last betas — otherwise a reset emits a LOWER fourth
      # octet than testers already have and Jellyfin never offers the newer build,
      # stranding them. So: never rename this workflow without bumping build.yaml's
      # A.B.C in the same change.
      env:
        RUN_NUMBER: ${{ github.run_number }}
      run: |
        base=$(grep -E '^version:[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"' build.yaml \
          | head -1 | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
        if [ -z "$base" ]; then
          echo "::error::Could not read a three-part version from build.yaml"; exit 1
        fi
        echo "base=${base}" >> "$GITHUB_OUTPUT"
        echo "beta=${base}.${RUN_NUMBER}" >> "$GITHUB_OUTPUT"
    - name: "Set the beta version in build.yaml"
      uses: fjogeleit/yaml-update-action@dffe9a5223d84653c13374032382f6bb5de8e5ef # v0.17.0
      with:
        valueFile: 'build.yaml'
        propertyPath: 'version'
        value: ${{ steps.version.outputs.beta }}
        commitChange: false
        updateFile: true
    - name: "JPRM: Build"
      id: jrpm
      uses: oddstr13/jellyfin-plugin-repository-manager@9497a0a499416cc572ed2e07a391d9f943a37b4d # v1.1.1
      with:
        version: ${{ steps.version.outputs.beta }}
        verbosity: debug
        path: .
        dotnet-target: "net9.0"
        output: _dist
    - name: Prepare GitHub Release assets
      run: |-
        pushd _dist
        for file in ./*.zip; do
          md5sum ${file#./} >> ${file%.*}.md5
          sha256sum ${file#./} >> ${file%.*}.sha256
        done
        ls -l
        popd
    - name: Upload beta assets to a draft release
      id: publish-assets
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
      with:
          # This repo has IMMUTABLE RELEASES on (deliberately — publish.yml relies on
          # it). A published release is sealed, so assets cannot be attached after it
          # is published: creating a published prerelease and then uploading its zip
          # fails ("Cannot upload asset ... to an immutable release"). So attach the
          # assets while the release is still a DRAFT (drafts are mutable), then
          # publish the draft in the next step (which seals it WITH its assets).
          #
          # Release NAME is the clean three-part X.Y.Z-beta; the git TAG carries the
          # build number (X.Y.Z-beta.<run>) to stay UNIQUE per run — an immutable
          # published release cannot be updated in place, so a rolling tag would fail
          # on its second run. The tag never matches publish.yml's
          # [0-9]+.[0-9]+.[0-9]+-stable glob, so a beta never triggers the stable
          # channel; and prerelease: true keeps it out of the stable manifest
          # (ignorePrereleases: true) — only the beta manifest below surfaces it. The
          # INSTALLED plugin version is X.Y.Z.<run> (the hidden fourth octet keeps
          # Jellyfin's update ordering monotonic across betas).
          draft: true
          prerelease: true
          name: ${{ steps.version.outputs.base }}-beta
          # Always auto-generate the release notes from the commits since the previous tag.
          generate_release_notes: true
          fail_on_unmatched_files: true
          tag_name: ${{ steps.version.outputs.base }}-beta.${{ github.run_number }}
          files: |
            _dist/*
            build.yaml
          body: |
            Jellyfin 10.11 beta ${{ steps.version.outputs.base }}-beta (plugin version ${{ steps.version.outputs.beta }}).
            Install via the beta repository URL:
            https://raw.githubusercontent.com/iderex/jellyfin-plugin-sso/manifest-beta/manifest.json
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Publish the draft release
      # Seal the draft — assets already attached — into an immutable published
      # prerelease (fires release.published). A draft has no git tag yet, so it is
      # published by its release id from the step above, not by tag name. -F sends
      # draft as a typed boolean.
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_ID: ${{ steps.publish-assets.outputs.id }}
        REPO: ${{ github.repository }}
      run: gh api "repos/${REPO}/releases/${RELEASE_ID}" -X PATCH -F draft=false
    - name: Publish Beta Plugin Manifest
      # ignorePrereleases: false so the beta build is included. Writes the SEPARATE
      # `manifest-beta` branch; the stable `manifest-release` is only ever written
      # by publish.yml, so a beta build can never reach the stable channel.
      uses: Kevinjil/jellyfin-plugin-repo-action@296850372cd569cbcc040e834222a5afed861485 # v0.4.3
      with:
        ignorePrereleases: false
        githubToken: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        pagesBranch: manifest-beta
        pagesFile: manifest.json
