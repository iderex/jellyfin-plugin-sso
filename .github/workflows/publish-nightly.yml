name: Publish Nightly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# The single build job also creates the GitHub release and updates the
# manifest branch, so it needs write access to repository contents.
permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        # The release/manifest steps authenticate with GITHUB_TOKEN via their action
        # inputs, not the git remote, so the persisted checkout token is unneeded.
        persist-credentials: false
    - name: Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: '**/packages.lock.json'
    - name: Restore dependencies
      # Match the CI build: --locked-mode rejects a drifted or tampered dependency graph.
      run: dotnet restore --locked-mode
    - name: Build Dotnet
      run: dotnet build --no-restore --warnaserror
    - name: "Flag as nightly in build.yaml"
      uses: fjogeleit/yaml-update-action@dffe9a5223d84653c13374032382f6bb5de8e5ef # v0.17.0
      with:
        valueFile: 'build.yaml'
        propertyPath: 'version'
        value: "0.0.0.9000"
        commitChange: false
        updateFile: true
    - name: "JPRM: Build"
      id: jrpm
      uses: oddstr13/jellyfin-plugin-repository-manager@9497a0a499416cc572ed2e07a391d9f943a37b4d # v1.1.1
      with:
        version: "0.0.0.9000"
        verbosity: debug
        path: .
        dotnet-target: "net9.0"
        output: _dist
    - name: Prepare GitHub Release assets
      run: |-
        pushd _dist
        for file in ./*.zip; do
          md5sum ${file#./} >> ${file%.*}.md5
          sha256sum ${file#./} >> ${file%.*}.sha256
        done
        ls -l
        popd
    - name: Publish output artifacts
      id: publish-assets
      uses: softprops/action-gh-release@132dbbba49e22bd4837f09b46d32a8edaf6baa58
      with:
          # Mark the nightly as a prerelease so the manifest step's ignorePrereleases
          # filter keeps 0.0.0.9000 out of the production manifest.json every plugin-repo
          # consumer fetches. Shipping it as a full release polluted that catalog.
          prerelease: true
          fail_on_unmatched_files: true
          tag_name: nightly
          files: |
            _dist/*
            build.yaml
          body: |
            Nightly build
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Publish Plugin Manifest
      uses: Kevinjil/jellyfin-plugin-repo-action@296850372cd569cbcc040e834222a5afed861485
      with:
        ignorePrereleases: true
        githubToken: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        pagesBranch: manifest-release
        pagesFile: manifest.json
