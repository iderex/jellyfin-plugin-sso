name: Publish Release

on:
  release:
    types:
      - released
  workflow_dispatch:

# Default to read-only; the jobs that create the release and update the
# manifest branch opt into write access explicitly.
permissions:
  contents: read

jobs:
  build:
    name: Build package
    uses: ./.github/workflows/build.yml
    with:
      dotnet-version: "9.0.*"
      dotnet-target:  "net9.0"
  upload:
    name: Upload release assets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Publishes the GitHub release asset, so needs write access.
    permissions:
      contents: write
    needs:
    - build
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-artifact
    - name: Prepare GitHub Release assets
      run: |-
        for file in ./*; do
          md5sum ${file#./} >> ${file%.*}.md5
          sha256sum ${file#./} >> ${file%.*}.sha256
        done
        ls -l
    - name: Publish output artifacts
      id: publish-assets
      uses: softprops/action-gh-release@132dbbba49e22bd4837f09b46d32a8edaf6baa58 # unreleased commit between v3.0.1 and v3.0.2
      with:
          prerelease: false
          fail_on_unmatched_files: true
          tag_name:  ${{ github.event.release.tag_name }}
          files: ./*
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  generate:
    name: Publish plugin manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Publishes the plugin manifest to the pages branch, so needs write access.
    permissions:
      contents: write
    needs:
    - upload
    steps:
    - name: Publish Plugin Manifest
      uses: Kevinjil/jellyfin-plugin-repo-action@296850372cd569cbcc040e834222a5afed861485 # v0.4.3
      with:
        ignorePrereleases: true
        githubToken: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        pagesBranch: manifest-release
        pagesFile: manifest.json
