name: Publish Release

# A three-part stable tag push (e.g. 4.1.1-stable) is the ONLY publish trigger,
# per the Releasing wiki page
# (https://github.com/iderex/jellyfin-plugin-sso/wiki/Releasing) — the beta
# soak / promotion gate a stable tag clears. The
# channel/generation is the tag SUFFIX — this is
# the JF10.11 line, so `X.Y.Z-stable`; the JF12 line publishes from `X.Y.Z-JF12-stable`
# on its own branch. The numeric X.Y.Z is the plugin version Jellyfin installs (it
# must be numeric — the suffix lives only in the tag + release name); it must match
# build.yaml's `version` (checked in the upload job). The glob matches only the
# `-stable` tags, never the beta prereleases (`X.Y.Z-beta.*`). The upload job CREATES
# and publishes the release from the tag in CI — never minted out of band, because a
# deleted immutable release permanently burns its tag.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+-stable"
  workflow_dispatch:

# Default to read-only; the jobs that create the release and update the
# manifest branch opt into write access explicitly.
permissions:
  contents: read

# Serialize with the JF12 stable leg (#655): both this JF10.11 stable publish and
# publish-jf12-stable.yml regenerate the SHARED manifest-release branch, so they must
# not run concurrently or their reader-vs-pusher regenerations race (a TOCTOU that
# could transiently drop the other generation's just-published build from the stable
# manifest — the same hazard the shared publish-manifest-beta group fixes for the beta
# legs). cancel-in-progress is false — a publish holding contents:write must never be
# killed mid-run.
concurrency:
  group: publish-manifest-release
  cancel-in-progress: false

jobs:
  build:
    name: Build package
    # A called reusable workflow is capped by the calling job's permissions, so
    # grant the signing scopes here (least privilege: only this job gets them) for
    # build.yml's provenance attestation. id-token: write mints the OIDC token
    # Sigstore signs with; attestations: write records the provenance.
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build.yml
    with:
      dotnet-version: "9.0.x"
      dotnet-target:  "net9.0"
      attest: true
  upload:
    name: Upload release assets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Publishes the GitHub release asset, so needs write access.
    permissions:
      contents: write
    needs:
    - build
    steps:
    - name: Download Artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-artifact
    # The CycloneDX SBOM the reusable workflow's isolated `sbom` job produced,
    # downloaded beside the plugin zip so the checksum loop and `files: ./*` ship it
    # as a release asset.
    - name: Download SBOM
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: sbom-artifact
    - name: Prepare GitHub Release assets
      run: |-
        # ONLY the plugin zip gets a `.md5`. Defence in depth: the generator this repo now
        # owns pairs a release's checksum with ITS zip by name, but the third-party one it
        # replaced kept the LAST asset ending in `.md5` with no pairing at all — which is how
        # renaming the plugin to `community-sso-for-jellyfin` moved its md5 ahead of
        # `sbom.cyclonedx.md5` alphabetically and made the manifest publish the SBOM's
        # checksum, breaking every install (#942). One `.md5` per release keeps that class
        # unreachable however the manifest is built. The SBOM keeps a sha256, the meaningful
        # integrity value for it.
        for file in ./*.zip; do
          md5sum ${file#./} >> ${file%.*}.md5
          sha256sum ${file#./} >> ${file%.*}.sha256
        done
        sha256sum sbom.cyclonedx.json >> sbom.cyclonedx.sha256
        ls -l
    - name: Publish output artifacts
      id: publish-assets
      # Creates the release for the pushed tag if it does not exist yet, then
      # uploads the assets. tag_name defaults to github.ref_name; set explicitly
      # so intent is obvious. fail_on_unmatched_files stays true so a missing
      # build asset fails the run rather than publishing an empty release.
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
      with:
          name: ${{ github.ref_name }}
          prerelease: false
          # Always auto-generate the release notes from the merged PRs/commits since
          # the previous tag, on every release.
          generate_release_notes: true
          fail_on_unmatched_files: true
          tag_name: ${{ github.ref_name }}
          files: ./*
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  generate:
    name: Publish plugin manifest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Publishes the plugin manifest to the pages branch, so needs write access.
    permissions:
      contents: write
    needs:
    - upload
    steps:
    # Needed so the local actions below resolve; the manifest step itself talks to the
    # API and uses nothing else from the working tree.
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    # The plugin identity (guid, name, description, …) the manifest is built around comes
    # from the metadata JPRM wrote beside the zip THIS run built — the same artifact the
    # upload job released. Reading it from the release list instead has no deterministic
    # answer once a rename is in flight, which is exactly the state that broke #942.
    - name: Download Artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: build-artifact
        path: _meta
    - name: Publish Plugin Manifest
      uses: ./.github/actions/generate-manifest
      with:
        plugin-metadata: _meta/*.zip.meta.json
        repository: ${{ github.repository }}
        manifest-branch: manifest-release
        include-prereleases: "false"
        github-token: ${{ github.token }}
    - name: Verify the published manifest
      # Post-publish DETECTOR for the class of "the manifest ships a checksum that matches
      # nothing" (#942) — it turns a silent, user-facing install outage into a red build.
      # It does not prevent: the release is already sealed and the manifest already written
      # by the time it runs.
      uses: ./.github/actions/verify-manifest
      with:
        repository: ${{ github.repository }}
        manifest-branch: manifest-release
        github-token: ${{ github.token }}
        # Only 10.11 today: no JF12 STABLE release exists, so requiring 12.0.0.0 here would red
        # every JF10.11 stable publish. This value does not need updating when JF12 goes GA —
        # the action's undated shrink check (ABI set vs the previous manifest revision) is what
        # catches a generation being evicted from this shared branch, from whichever leg published.
        require-abis: "10.11.0.0"
