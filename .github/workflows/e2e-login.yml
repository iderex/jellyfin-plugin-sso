# End-to-end SSO login harness (#720/#727/#919). Boots a real Jellyfin 10.11 + identity-provider stack with
# the PACKAGED plugin zip installed, and drives full login round-trips headlessly, asserting a Jellyfin
# session token is minted and usable, that the role gate refuses a role-less user, and that a replayed
# one-time state/token is refused. It supplements — never replaces — the manual Release-QA checklist.
#
# Provider-matrix policy (#919): a PR touching the harness, the nightly run, and a DEFAULT manual dispatch
# exercise ONLY the canonical Keycloak harness (there is deliberately no `push` trigger — the PR run already
# validated it, and paying the ~10-min Docker run again on the merge commit is wasteful). The FULL provider
# matrix (one entry per shipped test/e2e/<provider>/ harness) runs at a release and a beta-release — so the
# cross-provider pass is release-gate evidence, not a per-commit cost — and on a manual dispatch with
# `providers: all`, which is how a newly added harness is proven green BEFORE a release. This runs on
# the GitHub runners' working Docker; it also runs locally once Docker is restored (see test/e2e/README.md).
name: E2E Login Harness

on:
  # Nightly, so a real-stack OIDC+SAML login pass is per-day evidence (#720 gate-(a) support), offset
  # from the Scorecard (27 4) and Stryker (41 5) crons so the scheduled runs do not contend for a runner.
  schedule:
    - cron: "17 3 * * *"
  # Re-validate whenever the harness itself changes (a PR touching the compose/realm/driver or this
  # workflow), so the E2E stays green as it evolves — without paying the ~10-min Docker run on every push.
  pull_request:
    paths:
      - "test/e2e/**"
      - ".github/workflows/e2e-login.yml"
  # The FULL provider matrix runs on a release AND a beta-release (a prerelease), never on a routine push.
  release:
    types: [published, prereleased]
  # On-demand from any branch. `providers: all` runs the FULL matrix, which is the only way to exercise a
  # newly-added provider harness before a release actually happens — without it a new entry's first-ever run
  # would be on release day.
  workflow_dispatch:
    inputs:
      providers:
        description: "Which provider harnesses to run"
        type: choice
        options:
          - canonical
          - all
        default: canonical

# Deny-all at the workflow level; the e2e job reads the repo to build the plugin and needs nothing else.
permissions: {}

# Cancel a superseded run on the same ref — this is a test harness, not a publish, so cancelling an
# obsolete run is safe.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Choose which providers to run: the FULL matrix on a release/beta-release OR a manual dispatch with
  # `providers: all`; every other trigger (a PR touching the harness, the nightly schedule, a default
  # dispatch) runs just the one canonical Keycloak harness. A provider joins that matrix by adding one
  # { name, compose } object below, at its
  # test/e2e/<provider>/ compose file — the matrix grows one line per issue (#919).
  select:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        env:
          IS_RELEASE: ${{ github.event_name == 'release' }}
          # A manual dispatch may opt into the full matrix; the input is a constrained choice, and both values
          # reach the shell only through env (never interpolated into the script body).
          DISPATCH_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.providers == 'all' }}
        run: |
          set -euo pipefail
          keycloak='{"name":"Keycloak (OIDC + SAML)","compose":"test/e2e/docker-compose.yml"}'
          authelia='{"name":"Authelia (OIDC)","compose":"test/e2e/authelia/docker-compose.yml"}'
          authentik='{"name":"authentik (OIDC + SAML)","compose":"test/e2e/authentik/docker-compose.yml"}'
          dex='{"name":"Dex (OIDC)","compose":"test/e2e/dex/docker-compose.yml"}'
          zitadel='{"name":"Zitadel (OIDC)","compose":"test/e2e/zitadel/docker-compose.yml"}'
          pocketid='{"name":"Pocket ID (OIDC)","compose":"test/e2e/pocket-id/docker-compose.yml"}'
          kanidm='{"name":"Kanidm (OIDC)","compose":"test/e2e/kanidm/docker-compose.yml"}'
          # The full provider matrix (release/beta only). Every self-hostable provider in the README table
          # now has a harness here; adding one is a further object plus its test/e2e/<provider>/ directory.
          if [ "$IS_RELEASE" = "true" ] || [ "$DISPATCH_ALL" = "true" ]; then
            include="[$keycloak,$authelia,$authentik,$dex,$zitadel,$pocketid,$kanidm]"
          else
            include="[$keycloak]"
          fi
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

  e2e:
    needs: select
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      # One provider's failure must not cancel the others in the release matrix.
      fail-fast: false
      matrix: ${{ fromJSON(needs.select.outputs.matrix) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "9.0.x"

      - name: Build packaged plugin (JPRM)
        uses: oddstr13/jellyfin-plugin-repository-manager@9497a0a499416cc572ed2e07a391d9f943a37b4d # v1.1.1
        id: jprm
        with:
          dotnet-target: "net9.0"

      - name: Install the packaged plugin into the Jellyfin config
        # Unpack the exact packaged zip the release ships (meta.json + the plugin and its
        # non-host-provided dependency DLLs) into the bind-mounted Jellyfin plugins directory, so the
        # harness exercises the SAME artifact users install — including the packaged crypto DLL load
        # path on Linux (#181) that `dotnet test` cannot see. World-writable so the Jellyfin container
        # can persist the plugin's own provider configuration under /config regardless of its uid.
        env:
          ARTIFACT: ${{ steps.jprm.outputs.artifact }}
        run: |
          set -euo pipefail
          plugin_dir="test/e2e/jellyfin/config/plugins/SSO-Auth"
          mkdir -p "$plugin_dir"
          unzip -o "$ARTIFACT" -d "$plugin_dir"
          echo "Installed plugin files:"
          ls -la "$plugin_dir"
          chmod -R 0777 test/e2e/jellyfin

      - name: Generate the Authelia test TLS cert
        # Authelia 4.38 requires a secure session URL, so its harness serves TLS. The self-signed test cert
        # is generated here (never committed — no private key in the repo) for the authelia matrix entry.
        if: contains(matrix.compose, 'authelia')
        run: |
          set -euo pipefail
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout test/e2e/authelia/tls.key -out test/e2e/authelia/tls.crt \
            -days 3650 -subj "/CN=login.example.com" \
            -addext "subjectAltName=DNS:login.example.com"

      - name: Generate the Kanidm test TLS cert
        # Kanidm is TLS-only and its image has no shell to sequence its own cert-generate, so the harness
        # gets a self-signed test cert the same way Authelia does (never committed — no private key in the
        # repo). The CN/SAN must match the service-DNS alias and server.toml's domain/origin.
        if: contains(matrix.compose, 'kanidm')
        run: |
          set -euo pipefail
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout test/e2e/kanidm/key.pem -out test/e2e/kanidm/chain.pem \
            -days 3650 -subj "/CN=idm.example.com" \
            -addext "subjectAltName=DNS:idm.example.com"

      - name: Run the E2E login harness
        env:
          COMPOSE: ${{ matrix.compose }}
        run: |
          set -euo pipefail
          docker compose -f "$COMPOSE" up \
            --abort-on-container-exit --exit-code-from harness

      - name: Dump container logs on failure
        if: failure()
        env:
          COMPOSE: ${{ matrix.compose }}
        run: |
          echo "===== docker compose logs ====="
          docker compose -f "$COMPOSE" logs --no-color || true

      - name: Tear down
        if: always()
        env:
          COMPOSE: ${{ matrix.compose }}
        run: docker compose -f "$COMPOSE" down -v || true
