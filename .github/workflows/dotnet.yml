name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

# Read-only: build/test/scan only, no job here writes to the repo or a release.
permissions:
  contents: read

# Cancel a superseded run on the same ref so a new push / PR update does not
# queue behind an obsolete build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # No `name:` on this job: the "Protect main" ruleset's required status check
  # matches the literal check-run name, which defaults to the job id ("build")
  # when no `name:` is set. Overriding it here would rename the check run and
  # silently break the required-status-check gate.
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        # No step pushes via git, so do not leave the GITHUB_TOKEN persisted in
        # .git/config (zizmor "artipacked" hardening — shrinks the credential blast radius).
        persist-credentials: false
    - name: Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        # Both SDKs the multi-target build needs (#135): net9.0 for the Jellyfin 10.11 line, net10.0 for
        # the Jellyfin 12.0 line. `dotnet build`/`test` (no -f) build and test every TargetFramework, so
        # install both explicitly rather than relying on whatever the runner image happens to ship.
        dotnet-version: |
          9.0.x
          10.0.x
        # Cache the NuGet global-packages folder keyed on the committed lockfiles,
        # so a clean --locked-mode restore is a cache hit.
        cache: true
        cache-dependency-path: '**/packages.lock.json'
    - name: Jellyfin compatibility metadata check
      run: bash scripts/check-jellyfin-compat.sh
    - name: Restore dependencies
      # --locked-mode fails the restore if the committed packages.lock.json files would change,
      # so a drifted or tampered dependency graph cannot build in CI.
      run: dotnet restore --locked-mode
    - name: Vulnerable dependency scan
      run: |
        set -o pipefail
        dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt
        if grep -q "has the following vulnerable packages" vuln.txt; then
          echo "::error::Vulnerable NuGet dependencies found (see the log above)."
          exit 1
        fi
    - name: Build
      run: dotnet build --no-restore --warnaserror
    - name: Test
      run: dotnet test --no-build --verbosity normal
    # Line coverage for the RC coverage gate (#718). A second, instrumented run
    # of the net10.0 leg (the MTP CodeCoverage extension emits Cobertura); the
    # plain run above stays the canonical pass/fail signal for test correctness,
    # so a test failure under instrumentation (exit code 2 - timing heisenbugs
    # under the ~13x instrumentation overhead) is ignored HERE only; the
    # zero-tests exit (8) and any collector failure still fail this step.
    - name: Coverage (net10.0)
      run: dotnet test --project SSO-Auth.Tests/SSO-Auth.Tests.csproj -f net10.0 --no-build --coverage --coverage-output-format cobertura --coverage-output coverage.cobertura.xml --ignore-exit-code 2
    - name: Enforce the security-surface coverage bar
      # Fail-closed threshold on the security-decision surface only (#718): the
      # whole-codebase number is reported and tracked in docs/METRICS.md, but the
      # gate keys on the modules that decide auth/authz/linking/abuse outcomes, so
      # a trivially-thin non-critical path cannot trip it and a security-path
      # regression cannot slip through it.
      #
      # set -o pipefail is LOAD-BEARING: without it the step's status is tee's
      # exit 0 and every rejection the script makes (below-bar, unreadable or
      # empty report) would be silently discarded - the gate would be decorative.
      # GitHub's default shell for a bare `run:` is `bash -e` WITHOUT pipefail
      # (the same trap the vulnerable-dependency step above guards against).
      run: |
        set -o pipefail
        python3 scripts/check-coverage.py TestResults/coverage.cobertura.xml | tee -a "$GITHUB_STEP_SUMMARY"
    - name: Upload coverage report
      # always(): the report must survive a gate failure - it is exactly the
      # artifact needed to diagnose one. if-no-files-found stays error, so a
      # missing report still reds the job through this step.
      if: ${{ always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag=v7.0.1
      with:
        name: coverage-report
        retention-days: 30
        if-no-files-found: error
        path: TestResults/coverage.cobertura.xml

  # Verify the plugin's used Jellyfin API surface actually exists on the OLDEST server it claims to
  # support (build.yaml targetAbi), not only in the newer SDK the shipping build compiles against. A
  # member added after the floor would compile against the SDK but throw MissingMethodException at
  # login on an older 10.11 server (#142). Builds SSO-Auth against Jellyfin.* pinned to that floor.
  abi-floor:
    name: ABI floor build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Setup .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: 9.0.x
    - name: Derive the targetAbi floor
      id: floor
      run: |
        floor=$(grep -oP 'targetAbi:\s*"?\K[0-9]+\.[0-9]+\.[0-9]+' build.yaml | head -1)
        echo "version=$floor" >> "$GITHUB_OUTPUT"
        echo "Building against Jellyfin $floor (the declared targetAbi floor)."
    - name: Build against the ABI floor
      # A deliberately different Jellyfin version than the shipping build, so locked-mode is off here;
      # --warnaserror turns any missing or changed API on the floor into a hard failure.
      #
      # Pinned to -f net9.0: build.yaml's targetAbi (10.11.0.0) is the .NET 9 / Jellyfin 10.11 line's
      # floor, so this check is a net9-line concept. Without -f, `dotnet build` on the multi-target
      # csproj would also build the net10.0 leg against Jellyfin 10.11.0.0 — which proves nothing about
      # the net10/JF12 floor AND needs a net10 SDK this job does not install (#135 review). The net10 leg
      # is fully built + tested by the primary `build` job; its own JF12 ABI floor lands with the JF12
      # publish pipeline.
      env:
        FLOOR: ${{ steps.floor.outputs.version }}
      run: dotnet build SSO-Auth/SSO-Auth.csproj -f net9.0 -c Release --warnaserror -p:JellyfinVersion="$FLOOR" -p:RestoreLockedMode=false

  # Verify the plugin actually packages as a loadable Jellyfin plugin (JPRM builds it against the
  # targeted ABI and produces the manifest) on every PR, not only at release time.
  package:
    name: Package (JPRM)
    # build.yml is a reusable workflow whose build job declares id-token/attestations: write for its
    # release-only SLSA attest step (#147). A caller must grant every permission the callee declares, or
    # the reusable-workflow call fails to start ("workflow file issue"). This CI caller leaves `attest`
    # at its default (false), so the attest step never runs and no token or attestation is minted — the
    # grant only satisfies the reusable-workflow permission check.
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/build.yml
    with:
      dotnet-version: "9.0.x"
      dotnet-target: "net9.0"
