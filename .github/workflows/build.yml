name: Build

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: false
        default: "9.0.x"
        description: "The .NET version to setup for the build"
        type: string
      dotnet-target:
        required: false
        default: "net9.0"
        description: "The .NET target to set for JPRM"
        type: string
      attest:
        required: false
        default: false
        description: "Emit a signed SLSA build-provenance attestation for the built artifact. Release-only; leave false for CI/PR builds."
        type: boolean

# Deny-all at the workflow level; the build job opts into the scopes it needs. The
# plain build only reads; the provenance attestation step (opt-in via `attest`)
# needs an OIDC token and attestation write.
#
# ⚠️ REUSABLE-WORKFLOW CALLER CONTRACT — read before changing the build job's
# permissions or adding a caller. Because the build job DECLARES id-token +
# attestations: write below, EVERY caller of this reusable workflow MUST grant
# those same scopes on its calling job — INCLUDING a caller that leaves `attest`
# false. A caller that does not grant them fails the reusable-workflow call at
# STARTUP ("workflow file issue", a 0–1s run), not at the attest step. (This bit
# the .NET workflow once: dotnet.yml's package job called build.yml with only
# contents:read and startup_failed the whole run.) The scopes are NOT "capped away"
# for non-attesting callers — they are a hard prerequisite to start. Callers that
# must keep granting contents:read + id-token:write + attestations:write:
#   - .github/workflows/publish.yml  (release path; attest: true)
#   - .github/workflows/dotnet.yml   (CI Package job; leaves attest false)
permissions: {}

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # JPRM builds the plugin; nothing pushes via git, so drop the persisted token.
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "${{ inputs.dotnet-version }}"

      - name: Build Jellyfin Plugin
        uses: oddstr13/jellyfin-plugin-repository-manager@9497a0a499416cc572ed2e07a391d9f943a37b4d # v1.1.1
        id: jprm
        with:
          dotnet-target: "${{ inputs.dotnet-target }}"

      # SLSA v1.1 Build L3 provenance for the plugin zip. Running the attestation
      # inside this reusable workflow is what lifts the provenance from Build L2 to
      # L3: the recorded builder is a trusted, reusable workflow rather than an
      # inline job. Gated on `attest` so only the release pipeline signs (CI/PR
      # builds neither ship an artifact nor hold the signing token). The bytes
      # attested here are the exact bytes the release ships (upload/download of
      # `build-artifact` preserves them), so a downloaded release zip verifies with:
      #   gh attestation verify <plugin>.zip --repo iderex/jellyfin-plugin-sso
      - name: Attest build provenance
        if: ${{ inputs.attest }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "${{ steps.jprm.outputs.artifact }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag=v7.0.1
        with:
          name: build-artifact
          retention-days: 30
          if-no-files-found: error
          # The zip AND the metadata JPRM writes beside it. The manifest generator reads that
          # metadata (version, targetAbi and the plugin-level fields) as JSON rather than
          # parsing build.yaml, because the runner image ships jq but NOT yq — verified against
          # the runner-images tool list rather than assumed.
          path: |
            ${{ steps.jprm.outputs.artifact }}
            ${{ steps.jprm.outputs.artifact }}.meta.json

  # The CycloneDX SBOM runs in its OWN release-only job, DELIBERATELY WITHOUT the
  # signing scopes the build job holds. The SBOM generator installs a NuGet global
  # tool at run time; keeping it out of the job that carries id-token/attestations
  # write means a compromised tool can never reach the Sigstore signing identity or
  # mint a provenance attestation (SLSA L3 build-isolation). The SBOM is shipped as
  # a checksummed release asset (like the beta/JF12 legs), not attested — the
  # isolation is worth more than attesting the side-document.
  sbom:
    name: Generate SBOM
    if: ${{ inputs.attest }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Both SDKs: the SBOM documents the FULL multi-target closure, so the
      # whole-solution restore must evaluate both the net9.0 and net10.0 targets
      # (matching the JF12 legs' dual-SDK setup) regardless of which single target a
      # given publish leg ships.
      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      # Materialise the locked restore graph the SBOM reads. --locked-mode rejects a
      # drifted or tampered graph (RestoreLockedMode is also forced in CI), so the
      # SBOM documents exactly the committed packages.lock.json closure.
      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Generate CycloneDX SBOM
        id: sbom
        uses: ./.github/actions/cyclonedx-sbom
        with:
          output-dir: sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag=v7.0.1
        with:
          name: sbom-artifact
          retention-days: 30
          if-no-files-found: error
          path: ${{ steps.sbom.outputs.sbom-path }}
