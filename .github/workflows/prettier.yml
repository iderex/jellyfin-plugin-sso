name: Prettier Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

# Read-only: the lint only inspects tracked files, it never writes.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # No `name:` on this job: the "Protect main" ruleset's required status check
  # matches the literal check-run name, which defaults to the job id
  # ("prettier") when no `name:` is set. Overriding it here would rename the
  # check run and silently break the required-status-check gate.
  prettier:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # Default checkout (the PR merge commit) — it is what should be linted,
        # and checking out head_ref made the job an untrusted-checkout finding.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Prettify code
        uses: creyD/prettier_action@8c18391fdc98ed0d884c6345f03975edac71b8f0 # v4.6
        with:
          dry: True
          prettier_options: '--check **/*.{js,html,md,css,scss}'
