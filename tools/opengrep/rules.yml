# Opengrep (open-source Semgrep fork) rules that enforce this repo's greppable
# security invariants as lint rules — one rule per invariant, added as each is
# discovered (rule-per-regression). Deliberately narrow and low-false-positive:
# these are `generic`-mode token patterns, NOT semantic C# analysis, so they do
# not depend on the C# language parser (whose modern-C#/.NET 9 support is still
# maturing) and cannot silently mis-parse a file into a false negative. Every
# rule is verified to produce zero findings on the current clean tree; a rule
# fires only when an invariant regresses.
#
# Run locally exactly as CI does:
#   docker run --rm -v "$PWD:/src" opengrep/opengrep@sha256:<digest> \
#     opengrep scan --config tools/opengrep/rules.yml --error /src
rules:
  # Invariant (release pipeline): publishing is triggered by a tag push only.
  # Releases are immutable on GitHub — a manual `gh release` mutation permanently
  # burns a tag and bypasses the /release-prep gate. The publish workflows must
  # never create/edit/delete a release or its assets. Read-only verbs
  # (view/list/download) are intentionally allowed.
  - id: no-gh-release-mutation
    languages: [generic]
    severity: ERROR
    message: >-
      Do not mutate GitHub releases with `gh release`
      (create/edit/delete/upload/delete-asset). Publishing is triggered by a tag
      push only; releases are immutable and a manual mutation burns the tag and
      bypasses the release gate.
    patterns:
      - pattern-either:
          - pattern: gh release create
          - pattern: gh release edit
          - pattern: gh release delete
          - pattern: gh release upload
          - pattern: gh release delete-asset
    paths:
      include:
        - ".github/workflows/**"
        - "**/*.sh"
        - "**/*.ps1"
        - "tools/**"
      exclude:
        # This rule file necessarily contains the banned strings as its own
        # patterns — do not scan it (or its siblings) against itself.
        - "tools/opengrep/**"

  # Invariant (crypto / fail-closed): every security value (OAuth state, nonces,
  # generated passwords, tokens) must come from a CSPRNG (RandomNumberGenerator).
  # System.Random is a non-cryptographic PRNG and must never back a security
  # value. The plugin creates randomness only via RandomNumberGenerator today;
  # this rule blocks a regression to `new Random(...)`.
  - id: no-insecure-random
    languages: [generic]
    severity: ERROR
    message: >-
      Do not use System.Random for security values. Use
      RandomNumberGenerator (a CSPRNG) for any token, nonce, state, or generated
      secret.
    patterns:
      - pattern: new Random(...)
    paths:
      include:
        - "SSO-Auth/**/*.cs"

  # Invariant (architecture, #318 login-outcome step): the controller never returns
  # Problem()/ProblemDetails. A client-caused rejection is a LoginOutcome.Rejected/Denied
  # mapped to a 4xx by LoginStatusMapper; Problem() produced a 500 for client-caused
  # conditions (bad state, replay, disabled provider), which both leaks that a rejection
  # is a "server error" to monitoring and, on the disabled-provider path, distinguished a
  # disabled provider from an unknown one. Anything genuinely unexpected throws and becomes
  # a real 500 — never a manually-authored one.
  - id: no-controller-problem-result
    languages: [generic]
    severity: ERROR
    message: >-
      Do not return Problem()/ProblemDetails from the SSO controllers. A
      client-caused rejection is a LoginOutcome mapped to a 4xx by
      LoginStatusMapper; only genuinely unexpected faults become a 500, by
      throwing (#318).
    patterns:
      - pattern-either:
          - pattern: Problem(...)
          - pattern: new ProblemDetails
          - pattern: ProblemDetails(...)
    paths:
      include:
        - "SSO-Auth/**/*Controller.cs"

  # Invariant (architecture, #318 step 2b): once-per-interval throttling goes
  # through IntervalGate, whose guard/CAS semantics were adversarially reviewed
  # once and are pinned by tests (#331). Every hand-rolled predecessor seeded its
  # tick cursor with `DateTime.MinValue.Ticks`; that idiom reappearing outside
  # IntervalGate means someone is re-rolling a throttle cursor, re-introducing
  # the subtle backward-clock and CAS races the primitive was extracted to end.
  - id: no-inline-interval-throttle-cursor
    languages: [generic]
    severity: ERROR
    message: >-
      Do not hand-roll a once-per-interval throttle cursor. Use IntervalGate;
      its suppression guard, single-CAS-winner, and backward-clock semantics are
      reviewed and pinned by tests (#318, #331).
    patterns:
      - pattern: = DateTime.MinValue.Ticks
    paths:
      include:
        - "SSO-Auth/**/*.cs"
      exclude:
        - "SSO-Auth/Api/RateLimit/IntervalGate.cs"

  # Invariant (architecture, #318 config boundary): every configuration access
  # goes through ProviderConfigStore behind SSOPlugin's facade (ReadConfiguration
  # / MutateConfiguration / UpdateConfiguration). Reaching into
  # `SSOPlugin.Instance.Configuration` bypasses the config lock and the validated
  # save pipeline — the exact door the store extraction closed. The plugin itself
  # reads the property unqualified, so the clean tree has zero findings.
  - id: no-config-store-bypass
    languages: [generic]
    severity: ERROR
    message: >-
      Do not reach into SSOPlugin.Instance.Configuration. Read and write the
      configuration through SSOPlugin.Instance.ReadConfiguration /
      MutateConfiguration (the ProviderConfigStore facade), so every access
      takes the config lock and every save runs the validated pipeline (#318).
    patterns:
      - pattern: SSOPlugin.Instance.Configuration
    paths:
      include:
        - "SSO-Auth/**/*.cs"

  # Invariant (architecture, #318/#378 outbound policy): factory-based outbound
  # HTTP clients are created only through SsoHttp.CreateClient, so the
  # User-Agent and any future outbound policy (timeouts, headers) stay in one
  # place. The SSRF-guarded avatar fetch is the documented exception and builds
  # its own hardened SocketsHttpHandler (it never uses the factory). SsoHttp
  # itself receives the factory as a parameter named `factory`, so the clean
  # tree has zero findings for the controller-field pattern below.
  - id: no-raw-outbound-httpclient
    languages: [generic]
    severity: ERROR
    message: >-
      Do not create outbound HTTP clients from the factory directly. Go through
      SsoHttp.CreateClient so the User-Agent and future outbound policy stay in
      one place (#318, #378). The SSRF-guarded avatar fetch is the documented
      exception and builds its own hardened handler.
    patterns:
      - pattern: _httpClientFactory.CreateClient(...)
    paths:
      include:
        - "SSO-Auth/**/*.cs"
