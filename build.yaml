name: "SSO Authentication"
guid: "505ce9d1-d916-42fa-86ca-673ef241d7df"
imageUrl: "https://raw.githubusercontent.com/iderex/jellyfin-plugin-sso/main/img/logo.png"
version: "4.3.0"
# The oldest Jellyfin server this plugin claims to load on. The shipping build compiles against a
# newer 10.11.x SDK, so the CI `abi-floor` job also builds against this floor to prove every Jellyfin
# API the plugin calls exists here — otherwise a newer member would throw MissingMethodException at
# login on an older 10.11 server (#142). Raise this only to a floor that job still builds clean on.
targetAbi: "10.11.0.0"
framework: "net9.0"
owner: "iderex"
overview: "Sign in to Jellyfin through OpenID Connect or SAML 2.0 identity providers."
description: |
  Single sign-on for Jellyfin via OpenID Connect and SAML 2.0 — works with self-hosted and
  managed identity providers such as Authelia, Authentik, Keycloak, Pocket ID and Kanidm,
  with multiple providers side by side.
  Role-based access from provider claims (login, administrator, library folders, Live TV),
  avatar sync, self-service account linking, and an optional SSO-only mode that disables
  password login for every account except a designated break-glass admin.
  Sign-in works in the Jellyfin Web UI and, via Quick Connect, in native clients.
  A security-first continuation of the archived 9p4/jellyfin-plugin-sso.
  Documentation and provider setup guides: https://github.com/iderex/jellyfin-plugin-sso
category: "Authentication"
artifacts:
  - "SSO-Auth.dll"
  - "Duende.IdentityModel.OidcClient.dll"
  - "Duende.IdentityModel.dll"
  # id_token validation (#134): the runtime closure of the JWT validator that the
  # Jellyfin host does not provide. Jellyfin 10.11 ships no Microsoft.IdentityModel.*
  # and no Microsoft.Bcl.Cryptography, so these must travel in the plugin zip or every
  # OIDC login fails with FileNotFoundException. (Only non-host-provided deps are listed
  # here; Newtonsoft.Json, Jellyfin.*, MediaBrowser.* etc. come from the host.)
  - "Microsoft.IdentityModel.JsonWebTokens.dll"
  - "Microsoft.IdentityModel.Tokens.dll"
  - "Microsoft.IdentityModel.Logging.dll"
  - "Microsoft.IdentityModel.Abstractions.dll"
  - "Microsoft.Bcl.Cryptography.dll"
  # SAML XML-signature validation (#181): the runtime closure of the direct
  # System.Security.Cryptography.Xml reference — Pkcs, then Asn1 (its other dependency,
  # Microsoft.Bcl.Cryptography, is already listed above for OIDC). None of these are in
  # the ASP.NET Core shared framework Jellyfin 10.11 (.NET 9) runs on, so without them
  # the packaged plugin throws FileNotFoundException the moment SignedXml runs — every
  # packaged SAML login fails, even though local build/dotnet test are green (they run
  # against the full publish output). Keep in sync with `dotnet publish -c Release` on
  # every dependency change.
  - "System.Security.Cryptography.Xml.dll"
  - "System.Security.Cryptography.Pkcs.dll"
  - "System.Formats.Asn1.dll"
changelog: |
  4.2.1.0: Bug fix. The admin-or-self authorization check (AssertCanUpdateUser) now returns an explicit deny on a null or ambiguous authorization context instead of failing closed via an unhandled NullReferenceException that could surface as a 500 (#626). No change to normal authenticated requests.
  4.2.0.0: Feature release (BREAKING). SAML/Auth now accepts ONLY the one-time login-outcome token introduced in #251; the deprecation window that also accepted a raw pre-#251 assertion POSTed straight to SAML/Auth is removed (#528). A scripted client that posts a raw assertion, bypassing the rendered token page, is now rejected fail-closed. The normal browser login and linking flows are unaffected.
  4.1.1.0: Bug fix. Restore plugin loading on Jellyfin 10.11 (.NET 9). 4.1.0.0 pulled Duende.IdentityModel.OidcClient 7.x, whose assemblies reference the .NET 10 Microsoft.Extensions.Logging.Abstractions (10.0.0.0) that the host does not provide and the plugin does not ship, so it threw FileNotFoundException at construction and was disabled at startup. Pin OidcClient to the 6.x line (net9 ABI) and add a conformance test that no host-provided assembly is referenced above the .NET 9 floor. No configuration changes.
  4.1.0.0: Feature (BREAKING - on-disk secret format changed; forward-transparent, downgrade requires re-entering secrets). Security-parity hardening of the SAML and OpenID login path, secrets encrypted at rest, SAML AuthnRequest signing (RSA and ECDSA), admin-UI provider toggles, and the thin-controller architecture rework. See CHANGELOG.md.
  4.0.0.4: Fix security issue in SAML
  4.0.0.0: Jellyfin 10.11
  3.5.3.0: Allow for OID-provided avatars, various bugfixes and workarounds
  3.5.2.4: Updates for Jellyfin 10.9
  3.5.2.3: Improve OpenID discovery policy security rules, fix iOS login bugs related to cache
  3.5.2.2: Fix linking page when using new paths
  3.5.2.1: Hotfix for SAML null checks
  3.5.2.0: Allow overriding the scheme used for generating URLs.
  3.5.1.1: Change iframe URL to point to the web UI instead of the root 
  3.5.1.0: Improved paths! No more obscure "p" versus "r" URLs! Improve final redirect for automatic authentication. Add more configuration options for OpenID discovery.
  3.5.0.0: Add support for Live TV authentication. Fix various null pointer bugs.
  3.4.0.0: Add user self-service for linking existing accounts + managing existing links. Allow IDP accounts to be linked to jellyfin accounts with a different display-name.
  3.3.0.0: Add fallback authentication provider. Add OpenID admin page.
  3.2.0.0: Switch to hashmaps (BREAKING) for performance. Dump expected permissions in logs on error.
  3.1.0.1: Fix redirect bug in WebResponse (#7)
  3.1.0.0: Simplify auth flow so loading the web UI is not required
  3.0.0.0: Add more RBAC features and option to unregister user from SSO
  2.0.1.0: Fix improper artifact loading
  2.0.0.0: Add RBAC and Google support
  1.0.0.0: Initial Release
