# Authelia OpenID Provider config for the E2E login harness (#921). Test-only secrets (clearly marked),
# an in-container sqlite store, a filesystem notifier, and a single OIDC client for the plugin. Groups are
# exposed at the userinfo endpoint (the plugin fetches the profile to read them). OIDC-only — no SAML.
theme: light

log:
  level: debug

identity_validation:
  reset_password:
    jwt_secret: 'insecure_e2e_only_jwt_secret_0123456789abcdef'

server:
  address: 'tcp://0.0.0.0:9091'
  # Authelia 4.38 requires its session cookie URL to use a secure scheme, so the portal is served over TLS
  # with a self-signed cert for login.example.com (test-only). Jellyfin and the harness are pointed at this
  # cert as their trust anchor.
  tls:
    certificate: '/config/tls.crt'
    key: '/config/tls.key'

authentication_backend:
  password_reset:
    disable: true
  file:
    path: '/config/users_database.yml'

access_control:
  default_policy: 'one_factor'

session:
  secret: 'insecure_e2e_only_session_secret_0123456789ab'
  cookies:
    - domain: 'example.com'
      authelia_url: 'https://login.example.com:9091'
      name: 'authelia_session'
      same_site: 'lax'
      expiration: '1 hour'
      inactivity: '5 minutes'

regulation:
  max_retries: 0

storage:
  encryption_key: 'insecure_e2e_only_storage_encryption_key_0123'
  local:
    path: '/config/db.sqlite3'

notifier:
  disable_startup_check: true
  filesystem:
    filename: '/config/notification.txt'

identity_providers:
  oidc:
    hmac_secret: 'insecure_e2e_only_hmac_secret_0123456789abcd'
    jwks:
