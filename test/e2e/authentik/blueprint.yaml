# authentik seeding for the E2E login harness (#920): a jellyfin-access group, alice (in it) and bob (not),
# an OAuth2/OIDC provider + application for the plugin, and a groups scope mapping so the id_token/userinfo
# carries the user's group names under a `groups` claim (the plugin's RoleClaim). Test-only.
version: 1
metadata:
  name: e2e-jellyfin-oidc
context:
  redirect_uri: http://jellyfin:8096/sso/OID/redirect/authentik
entries:
  - model: authentik_core.group
    id: grp-access
    identifiers:
      name: jellyfin-access
    attrs:
      name: jellyfin-access

  - model: authentik_core.user
    id: user-alice
    identifiers:
      username: alice
    attrs:
      username: alice
      name: alice
      email: alice@example.com
      password: alice
      is_active: true
      groups:
        - !KeyOf grp-access

  - model: authentik_core.user
    id: user-bob
    identifiers:
      username: bob
    attrs:
      username: bob
      name: bob
      email: bob@example.com
      password: bob
      is_active: true

  # SAML uses distinct users from OIDC (carol/dave vs alice/bob) so the two protocols never contend over the
  # same Jellyfin account — the same split the Keycloak realm uses.
  - model: authentik_core.user
    id: user-carol
    identifiers:
      username: carol
    attrs:
      username: carol
      name: carol
      email: carol@example.com
      password: carol
      is_active: true
      groups:
        - !KeyOf grp-access

  - model: authentik_core.user
    id: user-dave
    identifiers:
      username: dave
    attrs:
      username: dave
      name: dave
      email: dave@example.com
      password: dave
      is_active: true

  # The plugin's SAML role gate reads an assertion attribute named exactly `Role`. authentik's built-in
  # Groups mapping emits the WS-Federation claim URI instead, so emit the group names under `Role` here.
  - model: authentik_providers_saml.samlpropertymapping
    id: sm-saml-role
    identifiers:
      name: e2e-saml-role
    attrs:
      name: e2e-saml-role
      saml_name: Role
      expression: |
        return [group.name for group in request.user.ak_groups.all()]

  - model: authentik_providers_oauth2.scopemapping
    id: sm-groups
    identifiers:
      name: e2e-groups
    attrs:
      name: e2e-groups
      scope_name: groups
      description: "the user's authentik groups"
      expression: |
        return {"groups": [group.name for group in request.user.ak_groups.all()]}

  - model: authentik_providers_oauth2.oauth2provider
    id: prov-oidc
    identifiers:
      name: jellyfin-oidc
    attrs:
      name: jellyfin-oidc
      client_id: jellyfin-oidc
      client_secret: jellyfin-oidc-secret
      client_type: confidential
      # sub_mode is deliberately LEFT AT THE DEFAULT (an opaque, stable subject). The plugin keys the account
      # link on `sub` precisely so an identity-provider-side rename cannot re-point it, so the harness must
      # exercise the opaque-subject shape a real deployment gets; the Jellyfin username comes from
      # preferred_username (supplied by the profile scope), not from sub.
      include_claims_in_id_token: true
      # Without an explicit signing key authentik falls back to symmetric HS256 (signed with the client
      # secret), which a standards-conformant RP rejects as invalid_signature. Pin authentik's built-in
      # self-signed keypair so id_tokens are RS256-signed and verifiable through the published JWKS.
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      redirect_uris:
        - matching_mode: strict
          url: !Context redirect_uri
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf sm-groups

  - model: authentik_core.application
    id: app-jellyfin
    identifiers:
      slug: jellyfin
    attrs:
      name: Jellyfin
      slug: jellyfin
      provider: !KeyOf prov-oidc

  - model: authentik_providers_saml.samlprovider
    id: prov-saml
    identifiers:
      name: jellyfin-saml
    attrs:
      name: jellyfin-saml
      # Dotted host: authentik validates this with Django's URLValidator, which rejects a single-label
      # hostname. The compose gives the Jellyfin service a `jellyfin.example.com` alias for exactly this.
      acs_url: http://jellyfin.example.com:8096/sso/SAML/post/authentik
      audience: jellyfin-saml
      sp_binding: post
      # The plugin validates an enveloped assertion signature, so the assertion must be signed with a real
      # keypair — the same reason the OAuth2 provider pins a signing key above.
      sign_assertion: true
      sign_response: false
      signing_kp:
        !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      # NameID = the username, so the subject the plugin binds to is the stable account name the harness
      # asserts against (mirrors the Keycloak realm).
      name_id_mapping:
        !Find [
          authentik_providers_saml.samlpropertymapping,
          [name, "authentik default SAML Mapping: Username"],
        ]
      authorization_flow:
        !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      property_mappings:
        - !KeyOf sm-saml-role

  - model: authentik_core.application
    id: app-jellyfin-saml
    identifiers:
      slug: jellyfin-saml
    attrs:
      name: Jellyfin (SAML)
      slug: jellyfin-saml
      provider: !KeyOf prov-saml
