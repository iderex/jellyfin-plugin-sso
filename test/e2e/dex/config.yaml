# Dex configuration for the E2E login harness (#925). Test-only: an in-memory store, one static OIDC client
# for the plugin, and static users. Dex's local password database deliberately carries NO groups — group
# membership in Dex comes only from an upstream connector — so this harness covers the login round-trip and
# the one-time-use negative, and leaves the role gate to the group-capable providers (Keycloak, Authelia,
# authentik). That limit is honest, not an oversight.
issuer: http://dex:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  # No consent screen: the harness drives a browser role headlessly, and consent adds nothing to what this
  # harness proves (the plugin never sees it).
  skipApprovalScreen: true
  passwordConnector: local

enablePasswordDB: true

staticPasswords:
  - email: "alice@example.com"
    username: "alice"
    userID: "alice-e2e"
    # bcrypt of "alice" — test-only.
    hash: "$2y$10$1EZlEodWrLJbM19sXU90aex9LZf7d65Wic5v8yKxrZHpTBT.LRWie"
  - email: "bob@example.com"
    username: "bob"
    userID: "bob-e2e"
    # bcrypt of "bob" — test-only.
    hash: "$2y$10$XeqH7bIPmnkD0GQsmvrhL.YzOsKUvRKEKHaP/HFzAIpp.vDzVbGZO"

staticClients:
  - id: jellyfin-oidc
    name: Jellyfin
    secret: jellyfin-oidc-secret
    redirectURIs:
      - "http://jellyfin:8096/sso/OID/redirect/dex"
